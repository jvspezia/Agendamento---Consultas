  <nav class="navbar navbar-dark fixed-top">

      <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
        <i class="bi bi-heart-pulse-fill me-2"></i>PetConsulta
      </a>
      <div class="d-flex align-items-center gap-2">
        <button class="btn-tema" id="btnTema" onclick="alternarTema()">🌙</button>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav mt-2 pb-2">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house me-2"></i>Início</a></li>
          <li class="nav-item"><a class="nav-link" href="cadastro-dono.html"><i class="bi bi-person-plus me-2"></i>Cadastro</a></li>
          <li class="nav-item"><a class="nav-link" href="agendar.html"><i class="bi bi-calendar-plus me-2"></i>Agendar</a></li>

        </ul>

    </div>

        <h5 class="fw-bold mt-3">Nenhuma consulta ainda</h5>

        </a>

      <!-- Lista de consultas -->
      <div id="listaConsultas"></div>

    </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
