<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PetConsulta — Cadastro do Tutor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav class="navbar navbar-dark fixed-top">
    <div class="container-fluid px-3 d-flex align-items-center justify-content-between">
      <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
        <i class="bi bi-heart-pulse-fill me-2"></i>PetConsulta
      </a>
      <button class="btn-tema" id="btnTema" onclick="alternarTema()">🌙</button>
    </div>
  </nav>

  <div class="page-content">
    <div style="max-width:480px; margin:0 auto;">

      <!-- Card cadastro existente -->
      <div id="cardExistente" class="d-none">
        <p class="page-title"><i class="bi bi-person-circle me-2 text-primary"></i>Seu Cadastro</p>
        <p class="page-subtitle">Dados salvos do tutor.</p>

        <div class="cadastro-existente-card">
          <div class="cadastro-existente-icon">✅</div>
          <h5 class="fw-bold mt-3" id="nomeExistente"></h5>
          <p id="textoExistente" style="color:var(--text-muted); font-size:0.9rem;"></p>
          <button class="btn-primary-blue mt-3" onclick="continuarCadastroExistente()">
            <i class="bi bi-arrow-right-circle-fill me-2"></i>Continuar com este cadastro
          </button>
          <button class="btn-editar mt-2" onclick="editarCadastro()">
            <i class="bi bi-pencil me-2"></i>Editar dados
          </button>
          <button class="btn-apagar mt-2" onclick="apagarDono()">
            <i class="bi bi-trash me-2"></i>Excluir cadastro
          </button>
        </div>
      </div>

      <!-- Formulário -->
      <div id="formCadastro" class="d-none">
        <p class="page-title"><i class="bi bi-person-circle me-2 text-primary"></i>Cadastro do Tutor</p>
        <p class="page-subtitle">Preencha seus dados para continuar o agendamento.</p>

        <div class="steps-bar mb-4">
          <div class="step-dot active">1</div>
          <div class="step-line"></div>
          <div class="step-dot">2</div>
          <div class="step-line"></div>
          <div class="step-dot">3</div>
        </div>

        <div class="form-card">
          <h5 class="fw-bold mb-3"><i class="bi bi-person-fill me-2 text-primary"></i>Dados Pessoais</h5>
          <div class="mb-3">
            <label class="form-label">Nome completo *</label>
            <input type="text" class="form-control" id="nome" placeholder="Seu nome completo"/>
          </div>
          <div class="mb-3">
            <label class="form-label">CPF *</label>
            <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" maxlength="14" oninput="formatarCPF(this)"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Data de nascimento *</label>
            <input type="date" class="form-control" id="nascimento"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Telefone (WhatsApp) *</label>
            <input type="tel" class="form-control" id="telefone" placeholder="(47) 99999-9999" maxlength="15" oninput="formatarTelefone(this)"/>
          </div>
          <div class="mb-3">
            <label class="form-label">E-mail *</label>
            <input type="email" class="form-control" id="email" placeholder="seu@email.com"/>
          </div>
        </div>

        <div class="form-card">
          <h5 class="fw-bold mb-3"><i class="bi bi-geo-alt-fill me-2 text-primary"></i>Endereço</h5>
          <div class="mb-3">
            <label class="form-label">CEP *</label>
            <div class="input-group">
              <input type="text" class="form-control" id="cep" placeholder="00000-000" maxlength="9" oninput="formatarCEP(this)"/>
              <button class="btn btn-outline-secondary" type="button" onclick="buscarCEP()">
                <i class="bi bi-search"></i>
              </button>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Endereço completo *</label>
            <input type="text" class="form-control" id="endereco" placeholder="Rua, número, complemento"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Bairro *</label>
            <input type="text" class="form-control" id="bairro" placeholder="Seu bairro"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Cidade *</label>
            <input type="text" class="form-control" id="cidade" placeholder="Sua cidade"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Como conheceu a clínica?</label>
            <select class="form-select" id="comoConheceu">
              <option value="">Selecione uma opção</option>
              <option value="indicacao">Indicação de amigo/familiar</option>
              <option value="instagram">Instagram</option>
              <option value="facebook">Facebook</option>
              <option value="google">Google</option>
              <option value="panfleto">Panfleto / outdoor</option>
              <option value="outro">Outro</option>
            </select>
          </div>
        </div>

        <div id="alertaErro" class="alert alert-danger d-none" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span id="mensagemErro"></span>
        </div>

        <button class="btn-primary-blue" onclick="salvarDono()">
          <i class="bi bi-arrow-right-circle-fill me-2"></i>Continuar — Cadastrar Pet
        </button>
        <button class="btn-voltar d-block w-100 text-center mt-2 mb-4" onclick="verificarCadastroDono()" id="btnVoltarDono" style="display:none!important;">
          <i class="bi bi-arrow-left me-1"></i>Cancelar edição
        </button>
      </div>

    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item"><i class="bi bi-house-fill"></i><span>Início</span></a>
    <a href="cadastro-dono.html" class="bottom-nav-item active"><i class="bi bi-person-plus-fill"></i><span>Cadastro</span></a>
    <a href="agendar.html" class="bottom-nav-item"><i class="bi bi-calendar-plus-fill"></i><span>Agendar</span></a>
    <a href="painel.html" class="bottom-nav-item"><i class="bi bi-list-check"></i><span>Consultas</span></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
